<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>

  <link rel="stylesheet" href="./css/index.css">
</head>
<body>

  <div class="calculator">

    <input id="display" type="text" class="display" value="0">

    <div class="buttons">
      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="backspace()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
	<path d="M0 0h24v24H0z" fill="none" />
	<path fill="currentColor" d="m11.4 16l2.6-2.6l2.6 2.6l1.4-1.4l-2.6-2.6L18 9.4L16.6 8L14 10.6L11.4 8L10 9.4l2.6 2.6l-2.6 2.6zM9 20q-.475 0-.9-.213t-.7-.587L2 12l5.4-7.2q.275-.375.7-.587T9 4h11q.825 0 1.413.587T22 6v12q0 .825-.587 1.413T20 20zm-4.5-8L9 18h11V6H9zm10 0" />
</svg>
</button>

      <button onclick="opt('/')" class="operator">/</button>
      <button onclick="opt('*')" class="operator">*</button>
      
      <button onclick="dataclicked('7')">7</button>
      <button onclick="dataclicked('8')">8</button>
      <button onclick="dataclicked('9')">9</button>
      <button onclick="opt('-')" class="operator">-</button>
      
      <button onclick="dataclicked('4')">4</button>
      <button onclick="dataclicked('5')">5</button>
      <button onclick="dataclicked('6')">6</button>
      <button onclick="opt('+')" class="operator">+</button>
      
      <button onclick="dataclicked('1')">1</button>
      <button onclick="dataclicked('2')">2</button>
      <button onclick="dataclicked('3')">3</button>
      <button onclick="opt('%')" class ="operator">%</button>
      
      <button onclick="dataclicked('0')" class="zero">0</button>
      <button onclick="dataclicked('.')">.</button>
      <button onclick="ResultData('=')" class="equal">=</button>
    </div>

  </div>
<script src="./js/index.js"></script>
</body>
</html>
